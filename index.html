<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FIN DEL MUNDO - TABLERO DE PROBABILIDADES</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  body { background: #0d0d0d; color: #F5F0E8; font-family: 'IBM Plex Mono', monospace; margin: 0; overflow-x: hidden; }
  .header { background: #1B3A6B; padding: 30px 20px; text-align: center; border-bottom: 5px solid #7B1D1D; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  .card { background: #F5F0E8; color: #1a1a1a; margin-bottom: 12px; padding: 18px; border-radius: 4px; border-left: 6px solid #1B3A6B; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
  .odds-badge { background: #1B3A6B; color: white; padding: 5px 12px; border-radius: 3px; font-weight: bold; font-size: 14px; }
  .error-box { background: #2a0000; color: #ff9999; padding: 20px; text-align: center; margin: 50px; border: 2px solid red; }
  .ticker-wrap { background: #7B1D1D; color: #FFD09A; padding: 10px; font-size: 13px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #000; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    fetch(`./data.json?v=${Date.now()}`)
      .then(res => {
        if (!res.ok) throw new Error("No se pudo cargar el archivo de datos.");
        return res.json();
      })
      .then(json => {
        if (!json.sections) throw new Error("El archivo de datos está incompleto.");
        setData(json);
      })
      .catch(err => {
        console.error(err);
        setError(err.message);
      });
  }, []);

  if (error) return (
    <div className="error-box">
      <h2>⚠️ ERROR DE TABLERO</h2>
      <p>{error}</p>
    </div>
  );

  if (!data) return (
    <div style={{display:'flex', justifyContent:'center', alignItems:'center', height:'100vh'}}>
      <h2 style={{color:'#8AACCF', letterSpacing:'4px'}}>SINCRONIZANDO INTELIGENCIA...</h2>
    </div>
  );

  // Función para blindar los textos rebeldes de la IA
  const parseParams = (params) => {
    if (!params) return "";
    if (typeof params === 'object') {
      // Si la IA mandó un objeto, extraemos sus valores y los unimos en un texto
      return Object.values(params).join(" | ");
    }
    return String(params);
  };

  return (
    <div>
      <div className="header">
        <h1 style={{fontFamily: 'Playfair Display', fontSize: 'clamp(24px, 5vw, 42px)', margin: 0}}>FIN DEL MUNDO</h1>
        <h2 style={{fontSize: '14px', letterSpacing: '3px', color: '#8AACCF', marginTop: '5px'}}>TABLERO DE PROBABILIDADES</h2>
        <p style={{fontSize: '11px', color: '#aaa', marginTop: '15px'}}>ÚLTIMA ACTUALIZACIÓN: {data.lastUpdated}</p>
      </div>

      <div className="ticker-wrap">
        <marquee scrollamount="5">
          {data.ticker && Array.isArray(data.ticker) ? data.ticker.join(" • ") : "ACTUALIZANDO FUENTES..."}
        </marquee>
      </div>
      
      <div className="container">
        {data.sections.map((sec, i) => (
          <div key={i} style={{marginBottom: '40px'}}>
            <h3 style={{color: '#8AACCF', borderBottom: '1px solid #333', paddingBottom: '10px', marginBottom: '15px', display:'flex', alignItems:'center', gap:'10px'}}>
              <span>{sec.flag}</span> {sec.label}
            </h3>
            {sec.rows && Array.isArray(sec.rows) && sec.rows.map((row, j) => (
              <div key={j} className="card">
                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '15px'}}>
                  <span style={{fontWeight: '700', fontSize: '15px', lineHeight: '1.4'}}>{row.event || "Escenario en desarrollo"}</span>
                  <span className="odds-badge">{row.odds || "N/A"}</span>
                </div>
                <p style={{fontSize: '12px', color: '#555', marginTop: '10px', lineHeight: '1.5', fontStyle: 'italic'}}>
                  {parseParams(row.params)}
                </p>
              </div>
            ))}
          </div>
        ))}
      </div>

      <footer style={{textAlign:'center', padding: '40px', color: '#555', fontSize: '10px', letterSpacing: '2px'}}>
        PROPIEDAD DE ADRIÁN ROFFIEL | PROYECTO DE ANÁLISIS OSINT
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
