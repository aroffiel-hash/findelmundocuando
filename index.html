<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── CONSTANTES ────────────────────────────────────────────────────────────────
const SECTION_ACCENT = [
  "#1B3A6B","#7B1D1D","#1B5E38","#7B3A00","#3A005E","#004E6B",
  "#6B1B3A","#5E3A00","#1B3A6B","#2C5F2E","#6B1B00","#003D6B",
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function calcImplied(o) {
  if (!o || o === "LIQUIDADO" || o === "N/A") return null;
  const n = parseFloat(String(o).replace(/\s/g, ""));
  if (isNaN(n)) return null;
  // Soporte decimal Polymarket (0.35) y momio americano (-150 / +220)
  if (n > 0 && n <= 1)   return Math.round(n * 100);
  if (n > 1 && n <= 100) return Math.round(n);
  return n < 0
    ? Math.round((Math.abs(n) / (Math.abs(n) + 100)) * 100)
    : Math.round((100 / (n + 100)) * 100);
}
const isFavorite = (o) => {
  if (!o || o === "LIQUIDADO") return false;
  const s = String(o).trim();
  if (s.startsWith("-")) return true;
  const n = parseFloat(s);
  return !isNaN(n) && n > 0 && n <= 1 && n > 0.5;
};
const oddsColor  = (o) => o === "LIQUIDADO" ? "#7B1D1D" : isFavorite(o) ? "#1B5E38" : "#1B3A6B";
const oddsBg     = (o) => o === "LIQUIDADO" ? "#FDF0E0" : isFavorite(o) ? "#EBF7EF" : "#EBF0FA";
const pctColor   = (p) => p === null ? "#999" : p >= 60 ? "#1B5E38" : p >= 30 ? "#7B4A00" : "#7B1D1D";

// ── TICKER ────────────────────────────────────────────────────────────────────
function Ticker({ items, isUpdating }) {
  const trackRef = useRef(null);
  const posRef   = useRef(0);
  const rafRef   = useRef(null);
  const SPEED    = 0.45;

  useEffect(() => {
    const track = trackRef.current;
    if (!track) return;
    let halfW = 0;
    const id = setTimeout(() => { halfW = track.scrollWidth / 2; }, 200);
    function step() {
      posRef.current += SPEED;
      if (halfW > 0 && posRef.current >= halfW) posRef.current = 0;
      track.style.transform = `translateX(${-posRef.current}px)`;
      rafRef.current = requestAnimationFrame(step);
    }
    rafRef.current = requestAnimationFrame(step);
    return () => { cancelAnimationFrame(rafRef.current); clearTimeout(id); };
  }, [items]);

  if (!items || items.length === 0) return null;
  const list = [...items, ...items];
  return (
    <div style={{ background: "#7B1D1D", overflow: "hidden", height: 32, display: "flex", alignItems: "center", borderBottom: "2px solid #5A1010" }}>
      <div ref={trackRef} style={{ display: "flex", alignItems: "center", whiteSpace: "nowrap", willChange: "transform" }}>
        {list.map((item, i) => (
          <span key={i} style={{
            fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#FFD09A",
            letterSpacing: 0.5, paddingRight: 64, flexShrink: 0,
          }}>
            {isUpdating && i === 0 ? "Actualizando fuentes..." : item}
          </span>
        ))}
      </div>
    </div>
  );
}

// ── MOVED BADGE ───────────────────────────────────────────────────────────────
function MovedBadge({ moved }) {
  if (!moved || moved === "none") return null;
  const d = moved === "down";
  return (
    <span style={{
      fontSize: 9, fontWeight: "700", padding: "2px 5px", borderRadius: 2, marginLeft: 6,
      background: d ? "#EBF7EF" : "#FDF0F0", color: d ? "#1B5E38" : "#7B1D1D",
      border: `1px solid ${d ? "#B0DAC0" : "#E8B0B0"}`,
      letterSpacing: 0.4, verticalAlign: "middle",
      fontFamily: "'IBM Plex Mono', monospace", whiteSpace: "nowrap",
    }}>
      {d ? "▼ ACORT." : "▲ ALARG."}
    </span>
  );
}

// ── EXPANDABLE PARAMS ─────────────────────────────────────────────────────────
function ExpandableParams({ text }) {
  const [exp, setExp] = useState(false);
  if (!text) return null;
  const LIMIT = 140;
  const long = text.length > LIMIT;
  return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5, color: "#6A6055", lineHeight: 1.7 }}>
      {exp || !long ? text : `${text.slice(0, LIMIT)}…`}
      {long && (
        <button onClick={() => setExp(e => !e)} style={{
          background: "none", border: "none", color: "#1B3A6B", fontSize: 10,
          fontWeight: "700", cursor: "pointer", padding: "0 4px",
          fontFamily: "'IBM Plex Mono', monospace",
        }}>{exp ? " [menos]" : " [más]"}</button>
      )}
    </div>
  );
}

// ── EVENT CARD ────────────────────────────────────────────────────────────────
function EventCard({ row, onDraftChange, onCommit, isEven }) {
  const settled = row.odds === "LIQUIDADO";
  const implied = calcImplied(row.odds);
  const oc  = oddsColor(row.odds);
  const obg = oddsBg(row.odds);
  const pc  = pctColor(implied);

  return (
    <div style={{
      background: settled ? "#FBF7EE" : isEven ? "#FAF7F2" : "#F5F0E8",
      borderBottom: "1px solid #E4DDD0", padding: "12px 16px", opacity: settled ? 0.78 : 1,
    }}>
      <div style={{ marginBottom: 8 }}>
        <span style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, fontWeight: "600",
          color: settled ? "#999" : "#1A1A1A", lineHeight: 1.45,
          textDecoration: settled ? "line-through" : "none",
        }}>{row.event}</span>
        <MovedBadge moved={row.moved} />
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
        {settled ? (
          <span style={{
            fontFamily: "'Playfair Display', serif", color: "#7B1D1D", fontSize: 13, fontWeight: "700",
            background: "#FDF0E0", padding: "5px 12px", borderRadius: 4, border: "1px solid #E8C890",
          }}>LIQUIDADO</span>
        ) : (
          <>
            <input
              value={row.draft}
              onChange={e => onDraftChange(e.target.value)}
              onBlur={onCommit}
              onKeyDown={e => { if (e.key === "Enter") onCommit(); }}
              style={{
                background: obg, border: `1.5px solid ${oc}55`, borderRadius: 5,
                color: oc, fontSize: 16, fontWeight: "700",
                fontFamily: "'IBM Plex Mono', monospace",
                width: 90, textAlign: "center", padding: "6px 4px",
                WebkitAppearance: "none",
              }}
            />
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 16, fontWeight: "700", color: pc, minWidth: 44, textAlign: "center" }}>
              {implied !== null ? `${implied}%` : "—"}
            </div>
            <div style={{ flex: 1, height: 5, borderRadius: 3, background: "#E0D8C8", overflow: "hidden" }}>
              <div style={{ width: `${implied || 0}%`, height: "100%", background: pc }} />
            </div>
          </>
        )}
      </div>
      <ExpandableParams text={row.params} />
    </div>
  );
}

function NewsImagePanel({ isUpdating }) {
  const [current, setCurrent] = useState(0);
  const [fade, setFade]       = useState(true);
  const timerRef = useRef(null);

  const goTo = useCallback((idx) => {
    clearInterval(timerRef.current);
    setFade(false);
    setTimeout(() => { setCurrent(idx); setFade(true); }, 220);
    timerRef.current = setInterval(() => {
      setFade(false);
      setTimeout(() => { setCurrent(c => (c + 1) % NEWS_CARDS.length); setFade(true); }, 220);
    }, 7000);
  }, []);

  useEffect(() => {
    timerRef.current = setInterval(() => {
      setFade(false);
      setTimeout(() => { setCurrent(c => (c + 1) % NEWS_CARDS.length); setFade(true); }, 220);
    }, 7000);
    return () => clearInterval(timerRef.current);
  }, []);

  const card = NEWS_CARDS[current];
  const { Scene } = card;

  return (
    <div style={{ background: "#0d0d0d", borderBottom: "3px solid #7B1D1D" }}>
      <div style={{
        position: "relative", height: 175, background: card.bg,
        overflow: "hidden", transition: "opacity 0.22s ease", opacity: fade ? 1 : 0,
      }}>
        <Scene/>
        <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.1) 55%, transparent 100%)" }}/>
        <div style={{
          position: "absolute", top: 10, left: 12, background: card.tagColor, color: "#FFF",
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, fontWeight: "700",
          letterSpacing: 1.5, padding: "3px 8px", borderRadius: 2,
        }}>{card.tag}</div>
        {isUpdating && (
          <div style={{
            position: "absolute", top: 10, right: 12, background: "rgba(27,58,107,0.9)", color: "#7AACCF",
            fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, fontWeight: "700", padding: "3px 8px", borderRadius: 2,
          }}>Actualizando...</div>
        )}
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "8px 13px 7px" }}>
          <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 13, fontWeight: "700", color: "#F0EDE6", lineHeight: 1.3, marginBottom: 3 }}>{card.headline}</div>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9.5, color: "#CCC", lineHeight: 1.4 }}>{card.sub}</div>
        </div>
      </div>
      {/* Controles */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 12px", background: "#111" }}>
        <button onClick={() => goTo((current - 1 + NEWS_CARDS.length) % NEWS_CARDS.length)} style={{ background: "none", border: "1px solid #2a2a2a", color: "#666", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, padding: "4px 9px", borderRadius: 2 }}>◀</button>
        <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
          {NEWS_CARDS.map((_, i) => (
            <button key={i} onClick={() => goTo(i)} style={{ width: i === current ? 20 : 6, height: 6, borderRadius: 3, background: i === current ? card.tagColor : "#333", border: "none", cursor: "pointer", padding: 0, transition: "all 0.3s ease" }}/>
          ))}
        </div>
        <button onClick={() => goTo((current + 1) % NEWS_CARDS.length)} style={{ background: "none", border: "1px solid #2a2a2a", color: "#666", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, padding: "4px 9px", borderRadius: 2 }}>▶</button>
      </div>
      <div style={{ padding: "3px 13px 6px", background: "#0d0d0d", fontFamily: "'IBM Plex Mono', monospace", fontSize: 8.5, color: "#444", letterSpacing: 0.5 }}>
        {current + 1}/{NEWS_CARDS.length} · Visualizaciones ilustrativas
      </div>
    </div>
  );
}

// ── ASIDE: CUOTAS CLAVE ───────────────────────────────────────────────────────
function AsideKeyOdds({ sections }) {
  const keyOdds = useMemo(() => {
    const all = [];
    (sections || []).forEach(s => (s.rows || []).forEach(r => {
      if (r.odds && r.odds !== "N/A" && r.odds !== "LIQUIDADO") {
        const p = calcImplied(r.odds);
        if (p !== null) all.push({ label: r.event, odds: r.odds, p });
      }
    }));
    const favs     = all.filter(r => isFavorite(r.odds)).sort((a, b) => b.p - a.p).slice(0, 3);
    const longshots = all.filter(r => !isFavorite(r.odds)).sort((a, b) => a.p - b.p).slice(0, 2);
    return [...favs, ...longshots];
  }, [sections]);

  return (
    <div style={{ background: "#F0EDE6", padding: "14px 14px" }}>
      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 11, fontWeight: "700", color: "#1B3A6B", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 10 }}>
        Cuotas destacadas
      </div>
      {keyOdds.length === 0 && (
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "#AAA" }}>Cargando...</div>
      )}
      {keyOdds.map((item, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, gap: 8 }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "#555", flex: 1, lineHeight: 1.4 }}>
            {item.label.slice(0, 48)}{item.label.length > 48 ? "…" : ""}
          </span>
          <div style={{ display: "flex", gap: 5, alignItems: "center", flexShrink: 0 }}>
            <span style={{
              fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, fontWeight: "700",
              color: oddsColor(item.odds), background: oddsBg(item.odds),
              padding: "2px 6px", borderRadius: 3,
            }}>{item.odds}</span>
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: "700", color: pctColor(item.p), minWidth: 30 }}>{item.p}%</span>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── TAB: FUENTES / METODOLOGÍA ────────────────────────────────────────────────

  const mono  = { fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#3A3A3A", lineHeight: 1.85 };

  const methodology = rawData?.methodology || "";

  return (
    <div style={{ padding: "24px 20px 80px", maxWidth: 860, margin: "0 auto" }}>
      <h2 style={{ ...serif, fontSize: 22, color: "#1B3A6B", marginBottom: 6, marginTop: 0 }}>Fuentes y Metodología</h2>
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "#AAA", marginBottom: 30 }}>
        Última actualización: {lastUpdated}
      </div>

      {/* Cómo leer el tablero */}
      <div style={{ background: "#FDF8F0", border: "1px solid #DDD0B8", borderLeft: "4px solid #7B4A00", borderRadius: 4, padding: "18px 20px", marginBottom: 28 }}>

        <div style={{ marginBottom: 16 }}>
          <div style={{ ...serif, fontWeight: "700", fontSize: 13, color: "#3A3A3A", marginBottom: 6 }}>¿Qué significan los números?</div>
          <p style={{ ...mono, fontSize: 11.5, color: "#555", margin: 0 }}>
            Las cuotas usan el formato americano de apuestas deportivas. Un número negativo (−160) significa que ese evento es <em>probable</em>. Un número positivo (+300) significa que es <em>poco probable</em>. El porcentaje al lado es la traducción directa: −160 = 62% de probabilidad. +300 = 25%.
          </p>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
          {[
            { ejemplo: "−400", pct: "80%", desc: "Muy probable — casi seguro", color: "#1B5E38", bg: "#EBF7EF" },
            { ejemplo: "−150", pct: "60%", desc: "Probable — favorito ligero", color: "#1B5E38", bg: "#EBF7EF" },
            { ejemplo: "+200", pct: "33%", desc: "Posible pero no probable", color: "#1B3A6B", bg: "#EBF0FA" },
            { ejemplo: "+1500", pct: "6%", desc: "Longshot — muy poco probable", color: "#7B1D1D", bg: "#FDF0E0" },
          ].map(r => (
            <div key={r.ejemplo} style={{ background: r.bg, borderRadius: 4, padding: "8px 12px", display: "flex", alignItems: "center", gap: 10 }}>

              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 700, color: r.color, minWidth: 34 }}>{r.pct}</span>

        <div style={{ marginBottom: 16 }}>
          <div style={{ ...serif, fontWeight: "700", fontSize: 13, color: "#3A3A3A", marginBottom: 6 }}>¿Qué significa ▼ ACORT. y ▲ ALARG.?</div>
          <p style={{ ...mono, fontSize: 11.5, color: "#555", margin: 0 }}>
            Cuando llega nueva información, las cuotas se mueven. <span style={{ color: "#1B5E38", fontWeight: 700 }}>▼ ACORTADO</span> significa que el evento se volvió más probable desde la última actualización. <span style={{ color: "#7B1D1D", fontWeight: 700 }}>▲ ALARGADO</span> significa que se volvió menos probable.
          </p>
        </div>

        <div>
          <div style={{ ...serif, fontWeight: "700", fontSize: 13, color: "#3A3A3A", marginBottom: 6 }}>¿De dónde vienen las cuotas?</div>
          <p style={{ ...mono, fontSize: 11.5, color: "#555", margin: 0 }}>
            {methodology || "Las cuotas se fijan analizando qué dicen los expertos (CFR, Chatham House, Crisis Group), qué condiciones existen para cada escenario, y con qué frecuencia situaciones similares han producido resultados similares históricamente. No son predicciones científicas — son una forma estructurada de pensar sobre la incertidumbre."}

        </div>
      </div>

      {/* Advertencia */}
      <div style={{ background: "#1A0000", border: "1px solid #5A1A1A", borderLeft: "4px solid #7B1D1D", borderRadius: 4, padding: "14px 18px", marginBottom: 28 }}>
        <div style={{ ...serif, fontWeight: "700", fontSize: 12, color: "#FF9999", marginBottom: 8 }}>⚠ Lo que este tablero NO es</div>
        <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#CC8888", lineHeight: 1.7, margin: 0 }}>

      )}

      <div style={{ textAlign: "center", fontSize: 10, color: "#AAA", marginTop: 24, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.8, lineHeight: 2 }}>
        PURAMENTE ESPECULATIVO · NO ES ASESORAMIENTO FINANCIERO NI DE INTELIGENCIA<br/>
        creado por adrián roffiel
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ─────────────────────────────────────────────────────────────
function App() {
  const [rawData,     setRawData]     = useState(null);
  const [sections,    setSections]    = useState([]);
  const [err,         setErr]         = useState(null);
  const [activeTab,   setActiveTab]   = useState("odds");
  const [collapsed,   setCollapsed]   = useState(new Set());
  const [isUpdating,  setIsUpdating]  = useState(false);
  const [lastUpdated, setLastUpdated] = useState("—");
  const [updateMsg,   setUpdateMsg]   = useState(null);

  // Cargar data.json
  const loadData = useCallback(async (silent = false) => {
    if (!silent) setIsUpdating(true);
    try {
      const r = await fetch(`./data.json?t=${Date.now()}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      if (!d.sections) throw new Error("JSON sin campo 'sections'");

      setRawData(d);
      setLastUpdated(d.lastUpdated || new Date().toISOString());
      // Añadir campo 'draft' a cada row para edición inline
      setSections(
        d.sections.map(s => ({
          ...s,
          rows: (s.rows || []).map(r => ({ ...r, draft: String(r.odds || "") })),
        }))
      );
      setErr(null);
      if (!silent) {
        setUpdateMsg("Datos actualizados correctamente.");
        setTimeout(() => setUpdateMsg(null), 4000);
      }
    } catch (e) {
      setErr(e.message);
    } finally {
      setIsUpdating(false);
    }
  }, []);

  // Carga inicial + polling cada 60 segundos
  useEffect(() => {
    loadData(true);
    const iv = setInterval(() => loadData(true), 60000);
    return () => clearInterval(iv);
  }, [loadData]);

  function setDraft(si, ri, val) {
    setSections(prev => prev.map((s, sIdx) => sIdx !== si ? s : {
      ...s, rows: s.rows.map((r, rIdx) => rIdx !== ri ? r : { ...r, draft: val })
    }));
  }
  function commit(si, ri) {
    setSections(prev => prev.map((s, sIdx) => sIdx !== si ? s : {
      ...s, rows: s.rows.map((r, rIdx) => rIdx !== ri ? r : { ...r, odds: r.draft })
    }));
  }
  function toggle(si) {
    setCollapsed(prev => {
      const n = new Set(prev);
      n.has(si) ? n.delete(si) : n.add(si);
      return n;
    });
  }

  const totalRows  = sections.reduce((a, s) => a + s.rows.length, 0);
  const settledN   = sections.reduce((a, s) => a + s.rows.filter(r => r.odds === "LIQUIDADO").length, 0);
  const ticker     = rawData?.ticker || [];

  // ── Pantalla de error ──────────────────────────────────────────────────────
  if (err && sections.length === 0) return (
    <div style={{ background: "#0d0d0d", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ background: "#1a0000", color: "#FF9999", padding: "32px 40px", borderRadius: 4, border: "2px solid #7B1D1D", textAlign: "center", maxWidth: 500 }}>
        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: "700", marginBottom: 12 }}>Error al cargar datos</div>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#CC8888", marginBottom: 20 }}>{err}</div>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#666", lineHeight: 1.8 }}>
          Asegúrate de que <code>data.json</code> existe.<br/>
          Corre: <code>python run_local.py</code>
        </div>
        <button onClick={() => loadData(false)} style={{ marginTop: 16, background: "#1B3A6B", color: "#F5F0E8", border: "none", padding: "10px 20px", borderRadius: 3, fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, cursor: "pointer" }}>
          Reintentar
        </button>
      </div>
    </div>
  );

  // ── Pantalla de carga inicial ──────────────────────────────────────────────
  if (sections.length === 0) return (
    <div style={{ background: "#0d0d0d", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "#5A8AAF", letterSpacing: 2, animation: "pulse 1.5s ease infinite" }}>
        Sincronizando datos...
      </div>
    </div>
  );

  return (
    <div style={{ background: "#F5F0E8", minHeight: "100vh", fontFamily: "'IBM Plex Mono', monospace" }}>

      {/* ── MASTHEAD ── */}
      <div style={{ background: "#1B3A6B", position: "sticky", top: 0, zIndex: 200, boxShadow: "0 3px 16px rgba(0,0,0,0.3)" }}>
        <div className="masthead-wrap">
          <Ticker items={ticker} isUpdating={isUpdating}/>

          <div style={{ padding: "12px 20px 0" }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
              <div>
                <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(15px, 3vw, 21px)", fontWeight: "900", color: "#F5F0E8", letterSpacing: 0.5, lineHeight: 1.1, marginBottom: 2, marginTop: 0 }}>
                  Tablero de Probabilidades Geopolítico
                </h1>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9.5, color: "#5A8AAF", letterSpacing: 0.4 }}>
                  {lastUpdated} · {totalRows} eventos · {settledN > 0 ? `${settledN} liquidado${settledN > 1 ? "s" : ""} · ` : ""}{sections.length} secciones
                </div>
              </div>
              <button onClick={() => loadData(false)} disabled={isUpdating} id="btn-actualizar" style={{
                display: "flex", alignItems: "center", gap: 5,
                background: isUpdating ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.15)",
                color: isUpdating ? "#7AACCF" : "#F5F0E8",
                border: "1px solid rgba(255,255,255,0.2)", cursor: isUpdating ? "not-allowed" : "pointer",
                fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: "700",
                letterSpacing: 0.8, padding: "7px 12px", borderRadius: 3,
                transition: "all 0.2s ease", whiteSpace: "nowrap",
              }}>
                <span style={{ display: "inline-block", animation: isUpdating ? "spin 1s linear infinite" : "none" }}>⟳</span>
                {isUpdating ? "Actualizando..." : "Actualizar fuentes"}
              </button>
            </div>

            {updateMsg && (
              <div style={{
                marginTop: 8, background: "rgba(27,94,56,0.25)", border: "1px solid rgba(27,94,56,0.4)",
                borderRadius: 3, padding: "6px 12px",
                fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "#7ACCA0",
              }}>{updateMsg}</div>
            )}

            {/* Pestañas */}
            <div style={{ display: "flex", marginTop: 10 }}>
              {[
                { id: "odds",    label: "Cuotas y escenarios" },
                { id: "sources", label: "Metodología" },
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
                  flex: 1, maxWidth: 200, padding: "9px 12px",
                  background: activeTab === tab.id ? "#F5F0E8" : "transparent",
                  border: "none", color: activeTab === tab.id ? "#1B3A6B" : "#5A8AAF",
                  fontSize: 10.5, fontWeight: "700", letterSpacing: 0.8, cursor: "pointer",
                  fontFamily: "'IBM Plex Mono', monospace",
                  borderRadius: activeTab === tab.id ? "4px 4px 0 0" : 0,
                  marginBottom: activeTab === tab.id ? "-1px" : 0,
                  textTransform: "uppercase",
                }}>{tab.label}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Panel de imágenes — móvil (solo < 900px) */}
      {activeTab === "odds" && (
        <div className="mobile-image-panel">
          <NewsImagePanel isUpdating={isUpdating}/>
        </div>
      )}

      {/* ── CUERPO ── */}
      {activeTab === "odds" ? (
        <div className="board-layout">

          {/* Columna principal: tablero de cuotas */}
          <div className="board-main">
            <div style={{ background: "#EAE4D8", padding: "7px 16px", borderBottom: "1px solid #C8BFA8", fontSize: 9.5, color: "#666", fontFamily: "'IBM Plex Mono', monospace", display: "flex", gap: 18, flexWrap: "wrap" }}>
              <span><span style={{ color: "#1B5E38" }}>■</span> favorito (−)</span>
              <span><span style={{ color: "#1B3A6B" }}>■</span> no favorito (+)</span>
              <span>Verde ≥60% · Dorado 30–59% · Rojo &lt;30%</span>
            </div>

            {sections.map((section, si) => {
              const isCollapsed = collapsed.has(si);
              const accent = SECTION_ACCENT[si % SECTION_ACCENT.length];
              return (
                <div key={si} style={{ marginTop: 8 }}>
                  <div onClick={() => toggle(si)} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "10px 16px", background: "#EEEAE2",
                    borderTop: `3px solid ${accent}`, borderBottom: "1px solid #D4C9B0",
                    cursor: "pointer",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      {section.flag && <span style={{ fontSize: 15 }}>{section.flag}</span>}
                      <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 12, fontWeight: "700", color: accent, letterSpacing: 1.5, textTransform: "uppercase" }}>
                        {section.label}
                      </span>
                      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "#AAA" }}>({section.rows.length})</span>
                    </div>
                    <span style={{ color: accent, fontSize: 11, fontWeight: "700" }}>{isCollapsed ? "▼" : "▲"}</span>
                  </div>
                  {!isCollapsed && section.rows.map((row, ri) => (
                    <EventCard key={ri} row={row}
                      onDraftChange={val => setDraft(si, ri, val)}
                      onCommit={() => commit(si, ri)}
                      isEven={ri % 2 === 0}
                    />
                  ))}
                </div>
              );
            })}

            <div style={{ textAlign: "center", padding: "16px 16px 36px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 9.5, color: "#C0B8A8", letterSpacing: 0.5, lineHeight: 1.9 }}>
              Puramente especulativo — no es asesoramiento financiero ni de inteligencia
            </div>
          </div>

          {/* Columna lateral: panel de imágenes + cuotas clave */}
          <div className="board-aside">
            <div style={{ background: "#1A1A1A", padding: "10px 14px", borderBottom: "1px solid #333" }}>
              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 11, fontWeight: "700", color: "#F5F0E8", letterSpacing: 2, textTransform: "uppercase" }}>
                Información del tablero
              </div>
              <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "#555", marginTop: 2, letterSpacing: 0.5 }}>
                Datos en tiempo real
              </div>
            </div>

            <NewsImagePanel isUpdating={isUpdating}/>
            <AsideKeyOdds sections={sections}/>
          </div>

        </div>
      ) : (
        <SourcesTab lastUpdated={lastUpdated} rawData={rawData}/>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
