<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GEOPOLITICAL ODDS BOARD</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
body { margin: 0; background-color: #0d0d0d; font-family: 'IBM Plex Mono', monospace; color: #1a1a1a; }
.main-container { max-width: 1200px; margin: 0 auto; background: #F5F0E8; min-height: 100vh; border-left: 1px solid #333; border-right: 1px solid #333; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
::-webkit-scrollbar { width: 0px; background: transparent; }
.tab-btn { background: none; border: none; padding: 12px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: bold; cursor: pointer; color: #888; transition: all 0.2s; letter-spacing: 1px; }
.tab-btn.active { color: #1B3A6B; border-bottom: 3px solid #1B3A6B; background: #EAE3D5; }
.grid-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; padding: 20px; }
@media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function calcImplied(o) {
  if (!o || o === "LIQUIDADO") return null;
  const n = parseFloat(String(o).replace(/\s/g, ""));
  if (isNaN(n)) return null;
  return n < 0 ? Math.round((Math.abs(n) / (Math.abs(n) + 100)) * 100) : Math.round((100 / (n + 100)) * 100);
}

const oddsColor = o => {
  if (o === "LIQUIDADO") return "#7B1D1D";
  return String(o).trim().startsWith("-") ? "#1B5E38" : "#1B3A6B";
};

const oddsBg = o => {
  if (o === "LIQUIDADO") return "#FDF0E0";
  return String(o).trim().startsWith("-") ? "#EBF7EF" : "#EBF0FA";
};

const pctColor = p => p === null ? "#999" : p >= 60 ? "#1B5E38" : p >= 30 ? "#7B4A00" : "#7B1D1D";

function MovedBadge({ moved }) {
  if (!moved || moved === "none") return null;
  const d = moved === "down";
  return (
    <span style={{
      fontSize: 9, fontWeight: "700", padding: "2px 5px", borderRadius: 2, marginLeft: 6,
      background: d ? "#EBF7EF" : "#FDF0F0", color: d ? "#1B5E38" : "#7B1D1D",
      border: `1px solid ${d ? "#B0DAC0" : "#E8B0B0"}`,
      letterSpacing: 0.4, verticalAlign: "middle",
      fontFamily: "'IBM Plex Mono', monospace", whiteSpace: "nowrap",
    }}>
      {d ? "▼ ACORT." : "▲ ALARG."}
    </span>
  );
}

function ExpandableParams({ text }) {
  const [exp, setExp] = useState(false);
  if (!text) return null;
  const tStr = String(text);
  const LIMIT = 130;
  const long = tStr.length > LIMIT;
  return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5, color: "#6A6055", lineHeight: 1.7, marginTop: 8 }}>
      {exp || !long ? tStr : `${tStr.slice(0, LIMIT)}…`}
      {long && (
        <button onClick={() => setExp(e => !e)} style={{
          background: "none", border: "none", color: "#1B3A6B", fontSize: 10,
          fontWeight: "700", cursor: "pointer", padding: "0 4px", fontFamily: "'IBM Plex Mono', monospace",
        }}>{exp ? " [menos]" : " [más]"}</button>
      )}
    </div>
  );
}

function Ticker({ items }) {
  const trackRef = useRef(null);
  const posRef = useRef(0);
  const rafRef = useRef(null);
  const SPEED = 0.45;

  useEffect(() => {
    const track = trackRef.current;
    if (!track) return;
    let halfW = 0;
    const id = setTimeout(() => { halfW = track.scrollWidth / 2; }, 100);
    function step() {
      posRef.current += SPEED;
      if (halfW > 0 && posRef.current >= halfW) posRef.current = 0;
      if(track) track.style.transform = `translateX(${-posRef.current}px)`;
      rafRef.current = requestAnimationFrame(step);
    }
    rafRef.current = requestAnimationFrame(step);
    return () => { cancelAnimationFrame(rafRef.current); clearTimeout(id); };
  }, [items]);

  if (!items || !items.length) return null;
  const list = [...items, ...items];
  return (
    <div style={{ background: "#7B1D1D", overflow: "hidden", height: 32, display: "flex", alignItems: "center" }}>
      <div ref={trackRef} style={{ display: "flex", alignItems: "center", whiteSpace: "nowrap", willChange: "transform" }}>
        {list.map((item, i) => (
          <span key={i} style={{
            fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#FFD09A",
            letterSpacing: 0.5, paddingRight: 64, flexShrink: 0, fontWeight: "bold"
          }}>
            {item}
          </span>
        ))}
      </div>
    </div>
  );
}

function EventCard({ row, isEven }) {
  const settled = row.odds === "LIQUIDADO";
  const implied = calcImplied(row.odds);
  const oc = oddsColor(row.odds);
  const obg = oddsBg(row.odds);
  const pc = pctColor(implied);
  return (
    <div style={{
      background: settled ? "#FBF7EE" : isEven ? "#FAF7F2" : "#F5F0E8",
      borderBottom: "1px solid #E4DDD0", padding: "12px 16px", opacity: settled ? 0.75 : 1,
    }}>
      <div style={{ marginBottom: 8 }}>
        <span style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, fontWeight: "600",
          color: settled ? "#999" : "#1A1A1A", lineHeight: 1.45,
          textDecoration: settled ? "line-through" : "none",
        }}>{row.event}</span>
        <MovedBadge moved={row.moved} />
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        {settled ? (
          <span style={{
            fontFamily: "'Playfair Display', serif", color: "#7B1D1D", fontSize: 13, fontWeight: "700",
            background: "#FDF0E0", padding: "5px 12px", borderRadius: 4, border: "1px solid #E8C890",
          }}>✓ LIQUIDADO</span>
        ) : (
          <>
            <div style={{
                background: obg, border: `1.5px solid ${oc}55`, borderRadius: 5,
                color: oc, fontSize: 16, fontWeight: "700",
                fontFamily: "'IBM Plex Mono', monospace",
                width: 75, textAlign: "center", padding: "4px 0"
              }}>
              {row.odds}
            </div>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 16, fontWeight: "700", color: pc, minWidth: 44, textAlign: "center" }}>
              {implied !== null ? `${implied}%` : "—"}
            </div>
            <div style={{ flex: 1, height: 5, borderRadius: 3, background: `linear-gradient(to right, ${pc} ${implied||0}%, #E0D8C8 ${implied||0}%)`, opacity: 0.65 }} />
          </>
        )}
      </div>
      <ExpandableParams text={row.params} />
    </div>
  );
}

function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState('board');

  useEffect(() => {
    const load = () => {
      fetch(`./data.json?t=${Date.now()}`)
        .then(r => r.json())
        .then(setData)
        .catch(console.error);
    };
    load();
    const interval = setInterval(load, 60000);
    return () => clearInterval(interval);
  }, []);

  if (!data) return <div style={{ background: "#0d0d0d", color: "#F5F0E8", height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "monospace" }}>INITIALIZING OSINT TERMINAL...</div>;

  return (
    <div className="main-container">
      <Ticker items={data.ticker} />
      
      <div style={{ padding: "20px", borderBottom: "2px solid #333", background: "#eeeae3" }}>
        <h2 style={{ margin:0, fontFamily: "'Playfair Display', serif", fontSize: 24, letterSpacing: '-0.5px' }}>GEOPOLITICAL ODDS BOARD</h2>
        <div style={{ fontSize: 10, fontWeight: "bold", color: "#666", marginTop: 4 }}>REAL-TIME INTELLIGENCE FEED // {data.lastUpdated}</div>
      </div>

      <div style={{ display: "flex", background: "#EAE3D5", borderBottom: "1px solid #ccc" }}>
        <button className={`tab-btn ${tab === 'board' ? 'active' : ''}`} onClick={() => setTab('board')}>PROBABILIDADES</button>
        <button className={`tab-btn ${tab === 'sources' ? 'active' : ''}`} onClick={() => setTab('sources')}>METODOLOGÍA</button>
      </div>

      {tab === 'board' ? (
        <div className="grid-layout">
          <div>
            {data.sections && data.sections.map((sec, i) => (
              <div key={i} style={{ marginBottom: 25, border: "1px solid #E4DDD0", borderRadius: 4, overflow: "hidden" }}>
                <div style={{ background: "#EAE3D5", padding: "8px 15px", borderBottom: "1px solid #E4DDD0", fontSize: 13, fontWeight: "bold", display: "flex", alignItems: "center", gap: 8 }}>
                  <span>{sec.flag}</span> {sec.label}
                </div>
                {sec.rows && sec.rows.map((row, j) => (
                  <EventCard key={j} row={row} isEven={j % 2 === 0} />
                ))}
              </div>
            ))}
          </div>
          
          <aside>
            <div style={{ background: "#1a1a1a", color: "#fff", padding: "15px", borderRadius: 4, marginBottom: 20 }}>
              <h4 style={{ margin: "0 0 15px 0", fontSize: 11, letterSpacing: 1 }}>RIESGOS SISTÉMICOS</h4>
              {[
                { l: "Escalada Bélica", kw: ["guerra", "nuclear", "conflicto", "ataque", "armas", "misil"], defaultVal: 19, c: "#7B1D1D" },
                { l: "Crisis Energética", kw: ["petróleo", "brent", "ormuz", "gas"], defaultVal: 42, c: "#7B4A00" },
                { l: "Inestabilidad Económica", kw: ["peso", "mxn", "recesión", "mercado", "dólar", "inflación"], defaultVal: 38, c: "#1B5E38" }
              ].map((r, i) => {
                let val = r.defaultVal;
                (data.sections || []).forEach(s => (s.rows || []).forEach(row => {
                  if (r.kw.some(k => (row.event || "").toLowerCase().includes(k))) {
                    const p = calcImplied(row.odds);
                    if (p !== null && p > val) val = p;
                  }
                }));

                return (
                  <div key={i} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 4 }}>
                      <span>{r.l}</span>
                      <span>{val}%</span>
                    </div>
                    <div style={{ height: 3, background: "#333" }}><div style={{ width: `${val}%`, height: "100%", background: r.c }} /></div>
                  </div>
                );
              })}
            </div>
          </aside>
        </div>
      ) : (
        <div style={{ padding: 30, fontSize: 12, lineHeight: 1.8, color: "#444" }}>
          <h3 style={{ fontFamily: "'Playfair Display', serif" }}>Fuentes de Datos</h3>
          <p>Este tablero agrega datos mediante un modelo de Inteligencia Artificial (Groq) alimentado con noticias en tiempo real para generar probabilidades implícitas de escenarios geopolíticos.</p>
          <ul>
            <li>Análisis de sentimiento automatizado</li>
            <li>Procesamiento de fuentes OSINT</li>
            <li>Actualización autónoma continua</li>
          </ul>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
