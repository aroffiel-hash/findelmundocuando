<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GOP - LIVE ODDS</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos similares al anterior, simplificados para velocidad */
        body { margin: 0; background: #0d0d0d; font-family: 'IBM Plex Mono', monospace; }
        .ticker-container { background: #7B1D1D; overflow: hidden; height: 35px; border-bottom: 2px solid #000; display: flex; align-items: center; }
        .ticker-track { display: flex; white-space: nowrap; animation: scroll 80s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-item { color: #FFD09A; padding-right: 50px; font-size: 12px; font-weight: bold; }
        .board { max-width: 900px; margin: 20px auto; background: #F5F0E8; box-shadow: 10px 10px 0px #000; padding: 20px; }
        .update-btn { background: #1B3A6B; color: white; border: none; padding: 10px; cursor: pointer; float: right; font-family: inherit; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState(null);

            const loadData = async () => {
                // El secreto: agregamos un timestamp para que no guarde caché y siempre traiga lo último de GitHub
                const resp = await fetch(`./data.json?t=${Date.now()}`);
                const json = await resp.json();
                setData(json);
            };

            useEffect(() => { loadData(); }, []);

            if (!data) return <div style={{color:'white'}}>Iniciando sistemas OSINT...</div>;

            return (
                <div>
                    <div className="ticker-container">
                        <div className="ticker-track">
                            {[...data.ticker, ...data.ticker].map((t, i) => (
                                <div key={i} className="ticker-item">{t}</div>
                            ))}
                        </div>
                    </div>
                    <div className="board">
                        <button className="update-btn" onClick={loadData}>🔄 SINCRONIZAR FUENTES</button>
                        <h1>GOP REAL-TIME ODDS</h1>
                        <hr/>
                        {data.sections.map((sec, i) => (
                            <div key={i}>
                                <h3 style={{color:'#7B1D1D'}}>{sec.title}</h3>
                                {sec.items.map((item, j) => (
                                    <p key={j}>{item.label}: <strong>{item.odds}</strong></p>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
