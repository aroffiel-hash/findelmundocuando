<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odds Board - OSINT LIVE</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #0d0d0d; font-family: 'IBM Plex Mono', monospace; color: #333; }
        /* Estilos de tu diseño original */
        .ticker-container { background: #7B1D1D; overflow: hidden; height: 32px; display: flex; align-items: center; border-bottom: 1px solid #000; }
        .ticker-track { display: flex; white-space: nowrap; animation: scroll 80s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-item { color: #FFD09A; font-size: 11px; padding-right: 64px; font-weight: bold; }
        .main-container { max-width: 860px; margin: 0 auto; background: #F5F0E8; min-height: 100vh; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
        .header { padding: 15px 20px; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; background: #eeeae3; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #ccc; border-bottom: 1px solid #ccc; }
        .section-card { background: white; padding: 15px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11px; align-items: center; }
        .odds-badge { font-weight: 700; padding: 2px 6px; borderRadius: 3px; font-size: 11px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState(null);

            const fetchData = async () => {
                const r = await fetch(`./data.json?v=${Date.now()}`);
                const j = await r.json();
                setData(j);
            };

            useEffect(() => { fetchData(); }, []);

            if (!data) return <div style={{color:'white', padding:20}}>Sincronizando con satélites OSINT...</div>;

            return (
                <div className="main-container">
                    {/* Ticker Original */}
                    <div className="ticker-container">
                        <div className="ticker-track">
                            {[...data.ticker, ...data.ticker].map((t, i) => (
                                <div key={i} className="ticker-item">{t}</div>
                            ))}
                        </div>
                    </div>

                    <div className="header">
                        <div>
                            <h2 style={{margin:0, fontSize:16, letterSpacing:'1px'}}>GEOPOLITICAL ODDS BOARD</h2>
                            <small style={{fontSize:9, color:'#666'}}>TERMINAL VER. 4.0.2 // ACTUALIZACIÓN AUTOMÁTICA</small>
                        </div>
                        <button onClick={fetchData} style={{background:'#1B3A6B', color:'white', border:'none', padding:'5px 10px', fontSize:10, cursor:'pointer'}}>
                            REFRESCAR DATOS
                        </button>
                    </div>

                    <div className="grid-container">
                        {data.sections.map((sec, i) => (
                            <div key={i} className="section-card">
                                <h3 style={{fontSize:12, color:'#7B1D1D', marginBottom:12, borderBottom:'1px solid #eee', paddingBottom:5}}>
                                    {sec.title}
                                </h3>
                                {sec.items.map((item, j) => (
                                    <div key={j} className="item-row">
                                        <span style={{flex:1, paddingRight:10}}>{item.label}</span>
                                        <div style={{display:'flex', gap:8}}>
                                            <span className="odds-badge" style={{
                                                background: item.odds.startsWith('-') ? '#EBF7EF' : '#EBF0FA',
                                                color: item.odds.startsWith('-') ? '#1B5E38' : '#1B3A6B'
                                            }}>{item.odds}</span>
                                            <span style={{fontWeight:'bold', width:30}}>{item.pct}%</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
