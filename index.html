<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TABLERO DE PROBABILIDADES</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;font-family:'IBM Plex Mono',monospace; overflow-x: hidden; color: #1a1a1a;}
button{cursor:pointer;font-family:'IBM Plex Mono',monospace;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#C8BFA8;border-radius:3px;}
.main-wrapper { max-width: 1300px; margin: 0 auto; background: #F5F0E8; min-height: 100vh; border-left: 1px solid #333; border-right: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
.layout{display:flex;align-items:flex-start; width: 100%;}
.col-main{flex:1;min-width:0; padding: 20px;}
.tab-btn { background: none; border: none; padding: 12px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: bold; cursor: pointer; color: #888; transition: all 0.2s; letter-spacing: 1px; }
.tab-btn.active { color: #1B3A6B; border-bottom: 3px solid #1B3A6B; background: #EAE3D5; }
.error-box { background: #2a0000; color: #ff9999; padding: 20px; text-align: center; margin: 50px; border: 2px solid red; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

function pct(odds){
  if(!odds||odds==="LIQUIDADO") return null;
  const n=parseFloat(String(odds).replace(/\s/g, ""));
  if(isNaN(n)) return null;
  return n<0?Math.round(Math.abs(n)/(Math.abs(n)+100)*100):Math.round(100/(n+100)*100);
}
function pc(p){return p===null?"#999":p>=60?"#1B5E38":p>=30?"#7B4A00":"#7B1D1D";}

function Ticker({items}){
  const ref=useRef();const pos=useRef(0);const raf=useRef();
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    let half=0;
    const t=setTimeout(()=>{half=el.scrollWidth/2;},500);
    const step=()=>{pos.current+=0.6;if(half>0&&pos.current>=half)pos.current=0;el.style.transform=`translateX(${-pos.current}px)`;raf.current=requestAnimationFrame(step);};
    raf.current=requestAnimationFrame(step);
    return()=>{cancelAnimationFrame(raf.current);clearTimeout(t);};
  },[items]);
  if(!items?.length)return null;
  const list=[...items,...items];
  return(
    <div style={{background:"#7B1D1D",overflow:"hidden",height:34,display:"flex",alignItems:"center", borderBottom:"2px solid #5A1010"}}>
      <div ref={ref} style={{display:"flex",whiteSpace:"nowrap",willChange:"transform"}}>
        {list.map((t,i)=><span key={i} style={{fontSize:12,fontWeight:600,color:"#FFD09A",paddingRight:60,flexShrink:0, textTransform: 'uppercase'}}>{t}</span>)}
      </div>
    </div>
  );
}

function EventCard({row,even}){
  const p = pct(row.odds);
  const isFav = String(row.odds||"").startsWith("-");
  return(
    <div style={{background:even?"#FAF7F2":"#F5F0E8",borderBottom:"1px solid #E4DDD0",padding:"14px 18px"}}>
      <div style={{marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:700,color:"#1A1A1A"}}>{row.event}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{background:isFav?"#EBF7EF":"#EBF0FA",border:`1.5px solid ${isFav?"#1B5E38":"#1B3A6B"}55`,borderRadius:3,color:isFav?"#1B5E38":"#1B3A6B",fontSize:15,fontWeight:700,width:75,textAlign:"center",padding:"4px 0",flexShrink:0}}>{row.odds}</div>
        <div style={{fontSize:15,fontWeight:700,color:pc(p),minWidth:40,textAlign:"right",flexShrink:0}}>{p!==null?`${p}%`:"—"}</div>
        <div style={{flex:1,height:5,borderRadius:2,background:"#E0D8C8",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",height:"100%",left:0,width:`${p||0}%`,background:pc(p)}}/>
        </div>
      </div>
      {row.params&&<div style={{fontSize:11,color:"#6A6055",marginTop:8}}>{row.params}</div>}
    </div>
  );
}

function App(){
  const [data,setData]=useState(null);
  const [err,setErr]=useState(null);

  useEffect(()=>{
    const load=()=>fetch(`./data.json?t=${Date.now()}`)
      .then(r=>{if(!r.ok)throw new Error("Buscando señal de datos...");return r.json();})
      .then(d=>{if(!d.sections) throw new Error("Datos corruptos"); setData(d); setErr(null);})
      .catch(e=>setErr(e.message));
    
    load();
    const iv=setInterval(load,60000); // Checa si el bot actualizó el archivo cada 60s
    return()=>clearInterval(iv);
  },[]);

  if(err) return <div className="error-box"><h3>⚠️ ESPERANDO DATOS</h3><p>{err}</p></div>;
  if(!data) return <div style={{color:"#8AACCF",textAlign:"center",padding:"50px"}}>SINCRONIZANDO INTELIGENCIA...</div>;

  return(
    <div className="main-wrapper">
      <Ticker items={data.ticker}/>
      
      <div style={{background:"#1B3A6B", padding:"20px 25px", borderBottom:"1px solid #333"}}>
        <h1 style={{margin:0,fontFamily:"'Playfair Display',serif",fontSize:"clamp(22px, 3vw, 32px)",fontWeight:900,color:"#F5F0E8"}}>TABLERO DE PROBABILIDADES</h1>
        <div style={{fontSize:11,fontWeight:700,color:"#8AACCF",marginTop:8,letterSpacing:1.5}}>ACTUALIZADO: {data.lastUpdated}</div>
      </div>

      <div className="layout">
        <div className="col-main">
          {data.sections.map((sec,i)=>(
            <div key={i} style={{marginBottom:25,border:"1px solid #E4DDD0",borderRadius:4,overflow:"hidden"}}>
              <div style={{background:"#EEEAE2",padding:"12px 18px",borderBottom:"1px solid #D4C9B0",borderTop:"4px solid #1B3A6B",fontSize:14,fontWeight:900,color:"#1a1a1a",letterSpacing:1.2}}>{sec.label}</div>
              {sec.rows.map((row,j)=><EventCard key={j} row={row} even={j%2===0}/>)}
            </div>
          ))}
        </div>
      </div>

      <footer style={{padding:"20px 0",textAlign:"center",borderTop:"2px solid #D4C9B0",background:"#EAE4D8"}}>
        <div style={{fontSize:11,color:"#888",fontWeight:700}}>DATOS OBTENIDOS VÍA API EN TIEMPO REAL</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
