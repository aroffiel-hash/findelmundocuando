<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FIN DEL MUNDO - TABLERO DE PROBABILIDADES</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;font-family:'IBM Plex Mono',monospace; overflow-x: hidden; color: #1a1a1a;}
button{cursor:pointer;font-family:'IBM Plex Mono',monospace;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#C8BFA8;border-radius:3px;}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.sk{background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%);background-size:800px 100%;animation:shimmer 1.5s infinite;}

.main-wrapper { max-width: 1300px; margin: 0 auto; background: #F5F0E8; min-height: 100vh; border-left: 1px solid #333; border-right: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5); transition: zoom 0.2s ease; transform-origin: top center; }
.layout{display:flex;align-items:flex-start; width: 100%;}
.col-main{flex:1;min-width:0; padding: 20px;}
.col-aside{width:380px;flex-shrink:0;background:#F5F0E8;border-left:2px solid #D4C9B0;align-self:stretch; display: flex; flex-direction: column;}

.scale-btn { background: #0d0d0d; color: #8AACCF; border: 1px solid #8AACCF; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-left: 5px;}
.scale-btn:hover { background: #8AACCF; color: #0d0d0d; }

.tab-btn { background: none; border: none; padding: 12px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: bold; cursor: pointer; color: #888; transition: all 0.2s; letter-spacing: 1px; }
.tab-btn.active { color: #1B3A6B; border-bottom: 3px solid #1B3A6B; background: #EAE3D5; }

@media(max-width:1024px){
  .layout{flex-direction: column;}
  .col-aside{width: 100%; border-left: none; border-top: 2px solid #D4C9B0;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

const ACCENTS=["#1B3A6B","#7B1D1D","#1B5E38","#7B3A00"];

const stripEmojis = (str) => {
    if (typeof str !== 'string') return '';
    return str.replace(/\p{Extended_Pictographic}/gu, '').trim();
};

// Función matemática corregida para procesar decimales (ej. 0.35) y momios americanos (-150)
function pct(odds){
  if(!odds||odds==="N/A"||odds==="LIQUIDADO") return null;
  const n = parseFloat(String(odds).replace(/\s/g, ""));
  if(isNaN(n)) return null;
  
  if(n > 0 && n <= 1) return Math.round(n * 100);
  if(n > 1 && n <= 100) return Math.round(n); 
  return n < 0 ? Math.round((Math.abs(n)/(Math.abs(n)+100))*100) : Math.round((100/(n+100))*100);
}

function pc(p){return p===null?"#999":p>=60?"#1B5E38":p>=30?"#7B4A00":"#7B1D1D";}

async function wikiImg(topic){
  try {
    if(!topic) return null;
    const t = topic.toLowerCase();
    let queryTitle = "Earth"; 
    
    if(t.includes("rusia") || t.includes("ucrania") || t.includes("putin")) queryTitle = "Moscow_Kremlin";
    else if(t.includes("china") || t.includes("taiwan") || t.includes("asia")) queryTitle = "Taipei";
    else if(t.includes("eleccion") || t.includes("eeuu") || t.includes("unidos")) queryTitle = "United_States_Capitol";
    else if(t.includes("petroleo") || t.includes("economia") || t.includes("mercado")) queryTitle = "Oil_refinery";
    else if(t.includes("israel") || t.includes("iran") || t.includes("oriente") || t.includes("gaza")) queryTitle = "Middle_East";

    const r = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${queryTitle}&prop=pageimages&format=json&pithumbsize=640&origin=*`);
    const d = await r.json();
    const pg = Object.values(d?.query?.pages||{})[0];
    return pg?.thumbnail?.source || null;
  } catch { return null; }
}

function Ticker({items}){
  const ref=useRef();const pos=useRef(0);const raf=useRef();
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    let half=0;
    const t=setTimeout(()=>{half=el.scrollWidth/2;},500);
    const step=()=>{pos.current+=0.6;if(half>0&&pos.current>=half)pos.current=0;el.style.transform=`translateX(${-pos.current}px)`;raf.current=requestAnimationFrame(step);};
    raf.current=requestAnimationFrame(step);
    return()=>{cancelAnimationFrame(raf.current);clearTimeout(t);};
  },[items]);
  if(!items?.length)return null;
  const list=[...items,...items];
  return(
    <div style={{background:"#7B1D1D",overflow:"hidden",height:34,display:"flex",alignItems:"center", borderBottom:"2px solid #5A1010"}}>
      <div ref={ref} style={{display:"flex",whiteSpace:"nowrap",willChange:"transform"}}>
        {list.map((t,i)=><span key={i} style={{fontSize:12,fontWeight:600,color:"#FFD09A",paddingRight:60,flexShrink:0, textTransform: 'uppercase'}}>{t}</span>)}
      </div>
    </div>
  );
}

function EventCard({row,even}){
  const oddsVal = String(row.odds || "N/A");
  const p = pct(oddsVal);
  const n = parseFloat(oddsVal.replace(/\s/g, ""));
  
  // Asignar colores correctos sin importar si es decimal o momio
  const isDecimal = !isNaN(n) && n > 0 && n <= 1;
  const isFav = isDecimal ? n > 0.5 : oddsVal.startsWith("-");
  
  const eventName = stripEmojis(row.event);
  
  return(
    <div style={{background:even?"#FAF7F2":"#F5F0E8",borderBottom:"1px solid #E4DDD0",padding:"14px 18px"}}>
      <div style={{marginBottom:8,display:"flex",justifyContent:"space-between"}}>
        <span style={{fontSize:13,fontWeight:700,color:"#1A1A1A",lineHeight:1.4}}>{eventName}</span>
        {row.moved&&row.moved!=="none"&&<span style={{fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:2,background:row.moved==="down"?"#EBF7EF":"#FDF0F0",color:row.moved==="down"?"#1B5E38":"#7B1D1D", border:`1px solid ${row.moved==="down"?"#B0DAC0":"#E8B0B0"}`}}>{row.moved==="down"?"▼ BAJÓ":"▲ SUBIÓ"}</span>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
        <div style={{background:isFav?"#EBF7EF":"#EBF0FA",border:`1.5px solid ${isFav?"#1B5E38":"#1B3A6B"}55`,borderRadius:3,color:isFav?"#1B5E38":"#1B3A6B",fontSize:15,fontWeight:700,width:75,textAlign:"center",padding:"4px 0",flexShrink:0}}>{oddsVal}</div>
        <div style={{fontSize:15,fontWeight:700,color:pc(p),minWidth:40,textAlign:"right",flexShrink:0}}>{p!==null?`${p}%`:"—"}</div>
        <div style={{flex:1,height:5,borderRadius:2,background:"#E0D8C8",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",height:"100%",left:0,width:`${p||0}%`,background:pc(p)}}/>
        </div>
      </div>
      {row.params&&<div style={{fontSize:11,color:"#6A6055",lineHeight:1.5, marginTop:8}}>{stripEmojis(row.params)}</div>}
    </div>
  );
}

function Carousel({sections}){
  const [imgs,setImgs]=useState({});
  const [cur,setCur]=useState(0);
  const [fade,setFade]=useState(true);
  const tim=useRef();

  const cards = useMemo(()=>{
    if(!sections) return [];
    return sections.slice(0, 5).map((s,i) => {
      const rows = s.rows || [];
      return { tag: stripEmojis(s.label), tagColor: ACCENTS[i%ACCENTS.length], headline: stripEmojis(rows[0]?.event || s.label) };
    });
  }, [sections]);

  useEffect(()=>{
    if(!cards.length) return;
    let dead=false;
    (async()=>{
      for(let i=0;i<cards.length;i++){
        if(dead) break;
        const u=await wikiImg(cards[i].headline);
        if(!dead) setImgs(p=>({...p,[i]:u||"x"}));
        await new Promise(r=>setTimeout(r,500)); 
      }
    })();
    return()=>{dead=true;};
  },[cards]);

  useEffect(()=>{
    if(!cards.length) return;
    tim.current=setInterval(()=>{setFade(false);setTimeout(()=>{setCur(c=>(c+1)%cards.length);setFade(true);},250);},6000);
    return()=>clearInterval(tim.current);
  },[cards.length]);

  if(!cards.length) return null;
  const c=cards[cur];
  const img=imgs[cur];
  const url=img&&img!=="x"?img:null;

  return(
    <div style={{borderBottom:"3px solid #7B1D1D", width: "100%"}}>
      <div style={{position:"relative",height:240,overflow:"hidden",opacity:fade?1:0,transition:"opacity .25s",background:"#111"}}>
        {!img&&<div className="sk" style={{width:"100%",height:"100%"}}></div>}
        {img&&url&&<img src={url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={()=>setImgs(p=>({...p,[cur]:"x"}))}/>}
        {img&&!url&&<div style={{width:"100%",height:"100%",background:`linear-gradient(135deg, ${c.tagColor}40, #050505)`}}></div>}
        
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 70%)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",top:12,left:15,background:c.tagColor||"#333",color:"#fff",fontSize:10,fontWeight:700,letterSpacing:1.2,padding:"4px 8px",borderRadius:2}}>{c.tag}</div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"15px 20px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:"#F0EDE6",lineHeight:1.3}}>{c.headline}</div>
        </div>
      </div>
    </div>
  );
}

function AsideContent({sections}){
  const keyOdds = useMemo(()=>{
    const all=[];
    (sections||[]).forEach(s=>(s.rows||[]).forEach(r=>{
      if(r.odds&&r.odds!=="N/A"){
          const n=parseFloat(String(r.odds).replace(/\s/g, ""));
          if(!isNaN(n)) {
            // Unificar la variable de orden para decimales y momios
            const normalizedN = (n > 0 && n <= 1) ? ((1-n)/n)*100 : n; 
            all.push({label:stripEmojis(r.event), odds:r.odds, p:pct(r.odds), n: normalizedN});
          }
      }
    }));
    return[...all.filter(r=>r.n<0).sort((a,b)=>a.n-b.n).slice(0,3), ...all.filter(r=>r.n>0).sort((a,b)=>a.n-b.n).slice(0,2)];
  },[sections]);

  const risks = useMemo(() => {
      const baselines = [
          { l: "Escalada Bélica Global", kw: ["war", "missile", "military", "strike", "conflicto"], v: 15, c: "#7B1D1D" },
          { l: "Tensión en Mercados/Petróleo", kw: ["oil", "economy", "fed", "inflation", "recesion", "mercado"], v: 30, c: "#7B4A00" },
          { l: "Inestabilidad Política", kw: ["election", "trump", "biden", "president", "gobierno"], v: 25, c: "#1B3A6B" }
      ];
      (sections||[]).forEach(s=>(s.rows||[]).forEach(r=>{
          baselines.forEach(risk => {
              if (risk.kw.some(k => (r.event||"").toLowerCase().includes(k))) {
                  const p = pct(r.odds);
                  if (p !== null && p > risk.v) risk.v = p;
              }
          });
      }));
      return baselines;
  }, [sections]);

  return(
    <div style={{width: "100%"}}>
      <Carousel sections={sections}/>
      <div style={{padding:"20px", borderBottom:"1px solid #E4DDD0", background:"#F0EDE6"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:900,letterSpacing:1.2,textTransform:"uppercase",marginBottom:15, color:"#1B3A6B"}}>🔥 Momios Calientes</div>
        {keyOdds.map((item,i)=>{
          const n = parseFloat(String(item.odds).replace(/\s/g, ""));
          const isDecimal = !isNaN(n) && n > 0 && n <= 1;
          const isFav = isDecimal ? n > 0.5 : String(item.odds).startsWith("-");
          return(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span style={{fontSize:11,color:"#444",flex:1,lineHeight:1.4, fontWeight: "600"}}>{item.label.slice(0,45)}{item.label.length>45?"…":""}</span>
              <span style={{fontSize:12,fontWeight:700,color:isFav?"#1B5E38":"#1B3A6B",background:isFav?"#EBF7EF":"#EBF0FA",padding:"3px 8px",borderRadius:3,flexShrink:0}}>{item.odds}</span>
            </div>
          );
        })}
      </div>
      <div style={{background:"#1a1a1a", padding:"25px 20px", flexGrow: 1}}>
        <div style={{fontSize:12,fontWeight:700,color:"#8AACCF",letterSpacing:1.5,textTransform:"uppercase",marginBottom:20, borderBottom:"1px solid #333", paddingBottom: 10}}>Termómetro de Riesgos</div>
        {risks.map((r,i)=>(
          <div key={i} style={{marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#DDD",marginBottom:6}}>
              <span>{r.l}</span><span style={{color:r.c,fontWeight:700, fontSize: 12}}>{r.v}%</span>
            </div>
            <div style={{height:5,background:"#333",borderRadius:3, overflow:"hidden"}}>
              <div style={{width:`${r.v}%`,height:"100%",background:r.c,borderRadius:3}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function SourcesTab(){
  return(
    <div style={{padding:"40px", maxWidth:"900px", margin:"0 auto", color:"#333"}}>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#1B3A6B",marginBottom:30, borderBottom: "2px solid #D4C9B0", paddingBottom: 10}}>Lectura y Metodología</h2>
      <div style={{background:"#fff",borderLeft:"4px solid #1B5E38",padding:"20px",marginBottom:30,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
        <h3 style={{margin:"0 0 12px 0",color:"#1B5E38",fontSize:16}}>1. Guía de Lectura</h3>
        <p style={{fontSize:13,lineHeight:1.6}}>El tablero convierte eventos globales en momios y probabilidades porcentuales en tiempo real para visualizar el riesgo geopolítico latente.</p>
      </div>
      <div style={{background:"#fff",borderLeft:"4px solid #7B1D1D",padding:"20px",marginBottom:40,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
        <h3 style={{margin:"0 0 12px 0",color:"#7B1D1D",fontSize:16}}>2. Análisis Técnico</h3>
        <p style={{fontSize:13,lineHeight:1.6}}>Datos obtenidos mediante el análisis de mercados de futuros e inteligencia estructurada con Inteligencia Artificial, calculando la probabilidad implícita de escenarios inminentes.</p>
      </div>
    </div>
  );
}

function App(){
  const [data,setData]=useState(null);
  const [err,setErr]=useState(null);
  const [tab,setTab]=useState("board");
  const [scale,setScale]=useState(1);

  useEffect(()=>{
    const load=()=>fetch(`./data.json?t=${Date.now()}`)
      .then(r=>{if(!r.ok)throw new Error("Sincronizando feed...");return r.json();})
      .then(d=>{if(!d.sections) throw new Error("Datos pendientes"); setData(d); setErr(null);})
      .catch(e=>setErr(e.message));
    
    load();
    const iv=setInterval(load,60000);
    return()=>clearInterval(iv);
  },[]);

  if(err) return <div style={{background:"#2a0000",color:"#ff9999",padding:"30px",margin:"50px auto",maxWidth:600,textAlign:"center",border:"2px solid red"}}><h3>⚠️ ESPERANDO DATOS</h3><p>{err}</p></div>;
  if(!data) return <div style={{background:"#0d0d0d",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#8AACCF",fontSize:14,letterSpacing:2}}>SINCRONIZANDO...</div>;

  return(
    <div className="main-wrapper" style={{zoom: scale}}>
      <Ticker items={data.ticker}/>
      
      <div style={{background:"#1B3A6B", padding:"20px 25px 0", borderBottom:"1px solid #333"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h1 style={{margin:0,fontFamily:"'Playfair Display',serif",fontSize:"clamp(22px, 3vw, 32px)",fontWeight:900,color:"#F5F0E8",lineHeight:1.1,letterSpacing:"-0.5px"}}>FIN DEL MUNDO - TABLERO DE PROBABILIDADES</h1>
            <div style={{fontSize:11,fontWeight:700,color:"#8AACCF",marginTop:8,letterSpacing:1.5}}>REAL-TIME INTELLIGENCE FEED // {data.lastUpdated}</div>
          </div>
          <div style={{display:"flex",alignItems:"center"}}>
            <span style={{fontSize:10,color:"#8AACCF",marginRight:5,fontWeight:"bold"}}>ZOOM:</span>
            <button className="scale-btn" onClick={()=>setScale(s=>Math.max(s-0.1, 0.8))}>A-</button>
            <button className="scale-btn" onClick={()=>setScale(s=>Math.min(s+0.1, 1.4))}>A+</button>
          </div>
        </div>
        
        <div style={{display:"flex",marginTop:20}}>
          <button className={`tab-btn ${tab==='board'?'active':''}`} onClick={()=>setTab('board')}>PROBABILIDADES Y ESCENARIOS</button>
          <button className={`tab-btn ${tab==='sources'?'active':''}`} onClick={()=>setTab('sources')}>METODOLOGÍA</button>
        </div>
      </div>

      <div className="layout">
        {tab==="board" ? (
          <>
            <div className="col-main">
              <div style={{background:"#EAE4D8",padding:"10px 18px",border:"1px solid #C8BFA8",borderRadius:4,fontSize:10,color:"#555",display:"flex",justifyContent:"space-between",fontWeight:"bold",marginBottom:20}}>
                <span><span style={{color:"#1B5E38",fontSize:12}}>■</span> FAVORITO (−)</span>
                <span><span style={{color:"#1B3A6B",fontSize:12}}>■</span> SORPRESA (+)</span>
                <span>RIESGO: VERDE ≥60% · ORO 30-59% · ROJO &lt;30%</span>
              </div>
              
              {data.sections.map((sec,i)=>{
                const rows = sec.rows||[];
                if(rows.length === 0) return null;
                return(
                  <div key={i} style={{marginBottom:25,border:"1px solid #E4DDD0",borderRadius:4,overflow:"hidden",boxShadow:"0 2px 4px rgba(0,0,0,0.02)"}}>
                    <div style={{background:"#EEEAE2",padding:"12px 18px",borderBottom:"1px solid #D4C9B0",borderTop:`4px solid ${ACCENTS[i%ACCENTS.length]}`,fontSize:14,fontWeight:900,color:"#1a1a1a",letterSpacing:1.2,textTransform:"uppercase"}}>
                      {stripEmojis(sec.label)}
                    </div>
                    {rows.map((row,j)=><EventCard key={j} row={row} even={j%2===0}/>)}
                  </div>
                );
              })}
            </div>
            
            <div className="col-aside">
              <AsideContent sections={data.sections} />
            </div>
          </>
        ) : (
          <div style={{width:"100%", background:"#F5F0E8"}}>
            <SourcesTab />
          </div>
        )}
      </div>

      <footer style={{height:"40px", background:"#EAE4D8", borderTop:"2px solid #D4C9B0"}}>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
