<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOP REAL-TIME ODDS</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #0d0d0d; font-family: 'IBM Plex Mono', monospace; }
        .main-container { max-width: 860px; margin: 0 auto; background: #F5F0E8; min-height: 100vh; border-left: 1px solid #333; border-right: 1px solid #333; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function calcImplied(o) {
            if (!o || o === "LIQUIDADO") return null;
            const n = parseFloat(o.replace(/\s/g, ""));
            if (isNaN(n)) return null;
            return n < 0 ? Math.round((Math.abs(n) / (Math.abs(n) + 100)) * 100) : Math.round((100 / (n + 100)) * 100);
        }
        const oddsColor = o => {
            if (!o || o === "LIQUIDADO") return "#7B1D1D";
            return o.trim().startsWith("-") ? "#1B5E38" : "#1B3A6B";
        };
        const oddsBg = o => {
            if (!o || o === "LIQUIDADO") return "#FDF0E0";
            return o.trim().startsWith("-") ? "#EBF7EF" : "#EBF0FA";
        };
        const pctColor = p => p === null ? "#999" : p >= 60 ? "#1B5E38" : p >= 30 ? "#7B4A00" : "#7B1D1D";

        function MovedBadge({ moved }) {
            if (!moved || moved === "none") return null;
            const d = moved === "down";
            return (
                <span style={{
                    fontSize: 9, fontWeight: "700", padding: "2px 5px", borderRadius: 2, marginLeft: 6,
                    background: d ? "#EBF7EF" : "#FDF0F0", color: d ? "#1B5E38" : "#7B1D1D",
                    border: `1px solid ${d ? "#B0DAC0" : "#E8B0B0"}`, letterSpacing: 0.4, verticalAlign: "middle", whiteSpace: "nowrap"
                }}>
                    {d ? "▼ ACORT." : "▲ ALARG."}
                </span>
            );
        }

        function ExpandableParams({ text }) {
            const [exp, setExp] = useState(false);
            const LIMIT = 130;
            if (!text) return null;
            const long = text.length > LIMIT;
            return (
                <div style={{ fontSize: 10.5, color: "#6A6055", lineHeight: 1.7, marginTop: 8 }}>
                    {exp || !long ? text : `${text.slice(0, LIMIT)}…`}
                    {long && (
                        <button onClick={() => setExp(!exp)} style={{
                            background: "none", border: "none", color: "#1B3A6B", fontSize: 10,
                            fontWeight: "700", cursor: "pointer", padding: "0 4px", fontFamily: "inherit"
                        }}>{exp ? " [menos]" : " [más]"}</button>
                    )}
                </div>
            );
        }

        function EventCard({ row, isEven }) {
            // BLINDAJE: Si la IA usa "label" en vez de "event", o si olvida el odd, lo soportamos.
            const eventName = row.event || row.label || "Evento sin título";
            const oddsVal = row.odds || "LIQUIDADO";
            const settled = oddsVal === "LIQUIDADO";
            const implied = row.pct !== undefined ? row.pct : calcImplied(oddsVal);
            const oc = oddsColor(oddsVal);
            const obg = oddsBg(oddsVal);
            const pc = pctColor(implied);
            
            return (
                <div style={{
                    background: settled ? "#FBF7EE" : isEven ? "#FAF7F2" : "#F5F0E8",
                    borderBottom: "1px solid #E4DDD0", padding: "12px 16px", opacity: settled ? 0.75 : 1,
                }}>
                    <div style={{ marginBottom: 8 }}>
                        <span style={{ fontSize: 12.5, fontWeight: "600", color: settled ? "#999" : "#1A1A1A", lineHeight: 1.45, textDecoration: settled ? "line-through" : "none" }}>
                            {eventName}
                        </span>
                        <MovedBadge moved={row.moved} />
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                        {settled ? (
                            <span style={{ fontFamily: "'Playfair Display', serif", color: "#7B1D1D", fontSize: 13, fontWeight: "700", background: "#FDF0E0", padding: "5px 12px", borderRadius: 4, border: "1px solid #E8C890" }}>
                                ✓ LIQUIDADO
                            </span>
                        ) : (
                            <>
                                <div style={{ background: obg, border: `1.5px solid ${oc}55`, borderRadius: 5, color: oc, fontSize: 16, fontWeight: "700", width: 90, textAlign: "center", padding: "6px 4px" }}>
                                    {oddsVal}
                                </div>
                                <div style={{ fontSize: 16, fontWeight: "700", color: pc, minWidth: 44, textAlign: "center" }}>
                                    {implied !== null ? `${implied}%` : "—"}
                                </div>
                                <div style={{ flex: 1, height: 5, borderRadius: 3, background: `linear-gradient(to right, ${pc} ${implied}%, #E0D8C8 ${implied}%)`, opacity: 0.65 }} />
                            </>
                        )}
                    </div>
                    <ExpandableParams text={row.params} />
                </div>
            );
        }

        function Ticker({ items, isUpdating }) {
            const trackRef = useRef(null);
            const posRef = useRef(0);
            const rafRef = useRef(null);
            const SPEED = 0.45;

            useEffect(() => {
                if (!items || items.length === 0) return;
                const track = trackRef.current;
                let halfW = 0;
                const id = setTimeout(() => { halfW = track.scrollWidth / 2; }, 100);
                function step() {
                    posRef.current += SPEED;
                    if (halfW > 0 && posRef.current >= halfW) posRef.current = 0;
                    if(track) track.style.transform = `translateX(${-posRef.current}px)`;
                    rafRef.current = requestAnimationFrame(step);
                }
                rafRef.current = requestAnimationFrame(step);
                return () => { cancelAnimationFrame(rafRef.current); clearTimeout(id); };
            }, [items]);

            if (!items) return null;
            const renderItems = [...items, ...items];

            return (
                <div style={{ background: "#7B1D1D", overflow: "hidden", height: 32, display: "flex", alignItems: "center" }}>
                    <div ref={trackRef} style={{ display: "flex", alignItems: "center", whiteSpace: "nowrap", willChange: "transform" }}>
                        {renderItems.map((item, i) => (
                            <span key={i} style={{ fontSize: 11, color: "#FFD09A", letterSpacing: 0.5, paddingRight: 64, flexShrink: 0, fontWeight: 'bold' }}>
                                {isUpdating && i === 0 ? "🔄 Actualizando fuentes..." : item}
                            </span>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            const [data, setData] = useState(null);
            const [updating, setUpdating] = useState(false);
            const [error, setError] = useState(false);

            const fetchData = async () => {
                setUpdating(true);
                setError(false);
                try {
                    const r = await fetch(`./data.json?v=${Date.now()}`);
                    if (!r.ok) throw new Error("Error HTTP");
                    const j = await r.json();
                    setData(j);
                } catch (e) { 
                    console.error("Fallo al cargar datos:", e); 
                    setError(true);
                }
                setUpdating(false);
            };

            useEffect(() => { fetchData(); }, []);

            if (error) return <div style={{color:'red', padding:30, textAlign: 'center', fontFamily: 'monospace'}}>❌ Error: No se pudo leer data.json. Revisa tu script de GitHub Actions.</div>;
            if (!data) return <div style={{color:'white', padding:30, textAlign: 'center', fontFamily: 'monospace'}}>📡 Iniciando enlace satelital OSINT...</div>;

            // BLINDAJE: Si Llama 3 omite el ticker o sections, creamos arrays vacíos para que no crashee
            const safeTicker = data.ticker || ["No hay datos en el ticker"];
            const safeSections = data.sections || [];

            return (
                <div className="main-container">
                    <Ticker items={safeTicker} isUpdating={updating} />
                    
                    <div style={{ padding: "15px 20px", borderBottom: "2px solid #333", display: "flex", justifyContent: "space-between", alignItems: "center", background: "#eeeae3" }}>
                        <div>
                            <h2 style={{ margin:0, fontFamily: "'Playfair Display', serif", fontSize: 20, color: "#1A1A1A", letterSpacing: '0.5px' }}>GEOPOLITICAL ODDS BOARD</h2>
                            <small style={{ fontSize: 10, color: "#666", fontWeight: "bold" }}>DATA VERIFIED OSINT // TERMINAL V.4.0.2</small>
                        </div>
                        <button onClick={fetchData} disabled={updating} style={{
                            background: "#1B3A6B", color: "white", border: "none", padding: "8px 14px", fontSize: 10, fontWeight: "bold", cursor: "pointer", borderRadius: 3, fontFamily: "inherit"
                        }}>
                            {updating ? "Sincronizando..." : "🔄 REFRESCAR DATOS"}
                        </button>
                    </div>

                    <div style={{ padding: 20 }}>
                        {safeSections.length === 0 && <div style={{textAlign:'center', color:'#7B1D1D'}}>No hay escenarios activos en este momento.</div>}
                        
                        {safeSections.map((sec, i) => {
                            // BLINDAJE: Soportar "rows" (diseño final) o "items" (diseño viejo)
                            const rows = sec.rows || sec.items || [];
                            return (
                                <div key={i} style={{ marginBottom: 20, border: "1px solid #E4DDD0", borderRadius: 5, overflow: "hidden", boxShadow: "0 2px 5px rgba(0,0,0,0.05)" }}>
                                    <div style={{ background: "#EAE3D5", padding: "8px 16px", borderBottom: "1px solid #E4DDD0", fontSize: 14, fontWeight: "bold", color: "#1A1A1A", letterSpacing: '0.5px' }}>
                                        {sec.flag || "📁"} {sec.label || sec.title || "SECCIÓN"}
                                    </div>
                                    {rows.map((row, j) => (
                                        <EventCard key={j} row={row} isEven={j % 2 === 0} />
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
