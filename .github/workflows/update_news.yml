name: Actualizar Noticias OSINT

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write  # IMPORTANTE: Permiso para que el bot escriba en el repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar Script de Actualización
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_board.py

      - name: Commit y Push de cambios
        run: |
          git config --global user.name 'OSINT-Bot'
          git config --global user.email 'bot@github.com'
          git add data.json
          git commit -m "Auto-update: Noticias de último minuto" || exit 0
          git push
