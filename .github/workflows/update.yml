name: Actualizar Tablero
on:
  schedule:
    - cron: '0 * * * *' # Corre cada hora
  workflow_dispatch: # Te permite correrlo manual si quieres

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Correr Motor de Datos
        run: python fetch_data.py
        
      - name: Guardar cambios
        run: |
          git config --global user.name 'Bot de Inteligencia'
          git config --global user.email 'bot@tusitio.com'
          git add data.json
          git commit -m "Automated update: data.json" || exit 0
          git push
